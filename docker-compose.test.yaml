# Usage:
#   Start:    docker compose up -d
#   Stop:     docker compose down
#   Destroy:  docker compose down -v --remove-orphans
#
# Copy .env.test.example to .env.test and adjust values before starting.

services:
  postgres:
    image: postgres:15
    container_name: nextbike_postgres_test
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./collection/create_bike_and_stations_db.sql:/docker-entrypoint-initdb.d/create_bike_and_stations_db.sql
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextbike_network_test

  collector:
    build:
      context: ./collection
      dockerfile: CONTAINERFILE
    container_name: nextbike_collector_test
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "while true; do python query_nextbike.py --save; sleep 60; done"
    networks:
      - nextbike_network_test

  processor:
    # Runs at midnight every day for each city in CITY_IDS
    build:
      context: ./processing
      dockerfile: CONTAINERFILE
    container_name: nextbike_processor_test
    restart: always
    environment:
      - DB_HOST=${DB_HOST}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - trip_data_test:/data
    networks:
      - nextbike_network_test

  visualization:
    build:
      context: ./visualization
      dockerfile: CONTAINERFILE
    container_name: nextbike_visualization_test
    restart: always
    env_file:
      - .env.test
    ports:
      - "${VISUALIZATION_PORT:-8080}:8080"
    volumes:
      - ./visualization:/app:ro
      - trip_data_test:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn api:app --host 0.0.0.0 --port 8080
    networks:
      - nextbike_network_test

volumes:
  postgres_data_test:
  trip_data_test:

networks:
  nextbike_network_test:
    driver: bridge
